services:
  - type: web
    name: digital-sla-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: DATABASE_PATH
        value: /tmp/database.db
      - key: SEED_DEMO_USERS
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: FLASK_SECRET_KEY
        sync: false
      - key: ALERT_DEFAULT_RECIPIENTS
        sync: false
